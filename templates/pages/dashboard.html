{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanceOS — Dashboard</title>
<!-- <link rel="stylesheet" href="../css/base.css"> -->
<!-- <link rel="stylesheet" href="/static/css/base.css"> -->

<link rel="stylesheet" href="{% static 'css/base.css' %}">

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── Stats Grid ──────────────────────────────────────────── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px; margin-bottom: 24px;
}
@media(max-width:1100px) { .stats-grid { grid-template-columns: repeat(2,1fr); } }
@media(max-width:600px)  { .stats-grid { grid-template-columns: 1fr; } }

.stat-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px 22px;
  position: relative; overflow: hidden;
  transition: border-color 0.2s, transform 0.2s;
}
.stat-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.stat-card::after {
  content: ''; position: absolute; top: -20px; right: -20px;
  width: 90px; height: 90px; border-radius: 50%; filter: blur(28px); opacity: 0.18;
}
.stat-card.income::after  { background: var(--green); }
.stat-card.expense::after { background: var(--red); }
.stat-card.balance::after { background: var(--blue); }
.stat-card.total::after   { background: var(--purple); }

.stat-label {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.09em;
  color: var(--text3); margin-bottom: 12px;
}
.stat-value {
  font-family: var(--font-mono); font-size: 28px; font-weight: 400;
  letter-spacing: -0.5px; margin-bottom: 6px; line-height: 1;
}
.stat-value.pos { color: var(--income); }
.stat-value.neg { color: var(--expense); }
.stat-value.neu { color: var(--blue); }
.stat-value.cnt { color: var(--purple); }
.stat-sub { font-size: 12px; color: var(--text3); }

/* ── Charts Grid ─────────────────────────────────────────── */
.charts-row {
  display: grid; grid-template-columns: 1.7fr 1fr;
  gap: 16px; margin-bottom: 24px;
}
@media(max-width:1000px) { .charts-row { grid-template-columns: 1fr; } }

.chart-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
}
.chart-header {
  padding: 18px 22px 0;
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 16px;
}
.chart-title { font-family: var(--font-head); font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.chart-sub   { font-size: 11px; color: var(--text3); }
.chart-body  { padding: 0 20px 20px; }
.chart-wrap  { position: relative; height: 200px; }

/* ── Recent table ─────────────────────────────────────────── */
.recent-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
}
.section-header {
  padding: 16px 22px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.section-title { font-family: var(--font-head); font-size: 14px; font-weight: 600; }
</style>
</head>
<body>
<div id="toast-container"></div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>

  <div class="main-area">
    <header class="topbar" id="topbar"></header>

    <main class="page-content">
      <!-- Stats -->
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card income"><div class="skeleton" style="height:32px;width:100px;margin-bottom:8px"></div><div class="skeleton" style="height:14px;width:60px"></div></div>
        <div class="stat-card expense"><div class="skeleton" style="height:32px;width:100px;margin-bottom:8px"></div><div class="skeleton" style="height:14px;width:60px"></div></div>
        <div class="stat-card balance"><div class="skeleton" style="height:32px;width:100px;margin-bottom:8px"></div><div class="skeleton" style="height:14px;width:60px"></div></div>
        <div class="stat-card total"><div class="skeleton" style="height:32px;width:100px;margin-bottom:8px"></div><div class="skeleton" style="height:14px;width:60px"></div></div>
      </div>

      <!-- Charts -->
      <div class="charts-row" id="charts-row">
        <div class="chart-card"><div style="padding:40px;text-align:center"><div class="skeleton" style="height:200px"></div></div></div>
        <div class="chart-card"><div style="padding:40px;text-align:center"><div class="skeleton" style="height:200px"></div></div></div>
      </div>

      <!-- Recent -->
      <div class="recent-card">
        <div class="section-header">
          <div class="section-title">Recent Transactions</div>
          <a href="records.html" class="btn btn-ghost btn-sm">View all →</a>
        </div>
        <div id="recent-body"><div style="padding:24px;color:var(--text3)">Loading…</div></div>
      </div>
    </main>
  </div>
</div>

<!-- <script src="../js/api.js"></script> -->
<script src="/static/js/api.js"></script>

<script>
if (!Auth.requireAuth()) throw '';

buildSidebar('dashboard');
buildTopbar('Dashboard');

let chartMonthly, chartCat;

async function loadDashboard() {
  try {
    // Fetch all records (non-paginated for stats)
    const data = await API.get('/records/', { page_size: 1000 });
    const all  = data.results || [];

    const income  = all.filter(r => r.entry_type === 'income').reduce((s, r) => s + +r.amount, 0);
    const expense = all.filter(r => r.entry_type === 'expense').reduce((s, r) => s + +r.amount, 0);
    const balance = income - expense;

    // ── Stats ──
    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card income fade-up">
        <div class="stat-label">Total Income</div>
        <div class="stat-value pos">${fmtCurrency(income)}</div>
        <div class="stat-sub">${all.filter(r=>r.entry_type==='income').length} entries</div>
      </div>
      <div class="stat-card expense fade-up delay-1">
        <div class="stat-label">Total Expenses</div>
        <div class="stat-value neg">${fmtCurrency(expense)}</div>
        <div class="stat-sub">${all.filter(r=>r.entry_type==='expense').length} entries</div>
      </div>
      <div class="stat-card balance fade-up delay-2">
        <div class="stat-label">Net Balance</div>
        <div class="stat-value ${balance>=0?'pos':'neg'}">${fmtCurrency(balance)}</div>
        <div class="stat-sub">${balance>=0?'Surplus':'Deficit'}</div>
      </div>
      <div class="stat-card total fade-up delay-3">
        <div class="stat-label">Records</div>
        <div class="stat-value cnt">${all.length}</div>
        <div class="stat-sub">All time</div>
      </div>`;

    // ── Charts ──
    const isAnalyst = Auth.isAnalyst();
    if (isAnalyst) {
      buildMonthlyChart(all);
      buildCategoryChart(all);
    } else {
      document.getElementById('charts-row').innerHTML = `
        <div class="chart-card" style="grid-column:1/-1">
          <div class="empty-state">
            <div class="empty-icon">🔒</div>
            <div class="empty-title">Analytics require Analyst or Admin role</div>
            <div class="empty-sub">Contact your administrator to upgrade your role</div>
          </div>
        </div>`;
    }

    // ── Recent ──
    const recent = all.slice(0, 8);
    document.getElementById('recent-body').innerHTML = recent.length
      ? `<table class="data-table">
          <thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Type</th><th>Amount</th></tr></thead>
          <tbody>${recent.map(r => `
            <tr>
              <td class="mono primary">${r.date}</td>
              <td>${r.description || '<span style="color:var(--text4)">—</span>'}</td>
              <td><span class="category-pill">${r.category}</span></td>
              <td><span class="tag tag-${r.entry_type}"><span class="tag-dot"></span>${r.entry_type}</span></td>
              <td class="mono" style="color:${r.entry_type==='income'?'var(--income)':'var(--expense)'};font-weight:500">
                ${r.entry_type==='income'?'+':'-'}${fmtCurrency(r.amount)}
              </td>
            </tr>`).join('')}
          </tbody>
        </table>`
      : `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No records yet</div><div class="empty-sub">Add your first financial record</div></div>`;

  } catch(e) {
    console.error(e);
    toast('Failed to load dashboard', 'error');
  }
}

function getLast6Months() {
  const d = new Date(); const months = [];
  for (let i = 5; i >= 0; i--) {
    const t = new Date(d.getFullYear(), d.getMonth() - i, 1);
    months.push({ key: `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}`, label: t.toLocaleString('default',{month:'short'}) });
  }
  return months;
}

const chartOpts = (yFmt = true) => ({
  responsive: true, maintainAspectRatio: false,
  plugins: {
    legend: { labels: { color: '#8891a8', font: { family:'DM Mono', size:11 }, boxWidth:10, padding:14 } },
    tooltip: { backgroundColor:'#0f1217', borderColor:'rgba(255,255,255,0.08)', borderWidth:1, bodyColor:'#eaedf5', callbacks: yFmt ? { label: ctx => ` ${ctx.dataset.label}: ${fmtCurrency(ctx.raw)}` } : {} }
  },
  scales: {
    x: { ticks: { color:'#50596e', font:{family:'DM Mono',size:10} }, grid: { color:'rgba(255,255,255,0.03)' } },
    y: { ticks: { color:'#50596e', font:{family:'DM Mono',size:10}, callback: v => '₹'+v.toLocaleString('en-IN') }, grid: { color:'rgba(255,255,255,0.03)' }, beginAtZero: true }
  }
});

function buildMonthlyChart(all) {
  const months = getLast6Months();
  const inc = months.map(m => all.filter(r=>r.entry_type==='income' &&r.date.startsWith(m.key)).reduce((s,r)=>s+ +r.amount,0));
  const exp = months.map(m => all.filter(r=>r.entry_type==='expense'&&r.date.startsWith(m.key)).reduce((s,r)=>s+ +r.amount,0));
  document.getElementById('charts-row').children[0].innerHTML = `
    <div class="chart-header"><div><div class="chart-title">Monthly Overview</div><div class="chart-sub">Income vs Expenses — last 6 months</div></div></div>
    <div class="chart-body"><div class="chart-wrap"><canvas id="monthly-chart"></canvas></div></div>`;
  chartMonthly = new Chart(document.getElementById('monthly-chart').getContext('2d'), {
    type: 'bar',
    data: {
      labels: months.map(m=>m.label),
      datasets: [
        { label:'Income',  data:inc, backgroundColor:'rgba(94,234,212,0.65)', borderRadius:6, borderSkipped:false },
        { label:'Expense', data:exp, backgroundColor:'rgba(248,113,113,0.65)', borderRadius:6, borderSkipped:false },
      ]
    },
    options: chartOpts()
  });
}

function buildCategoryChart(all) {
  const cats = {};
  all.filter(r=>r.entry_type==='expense').forEach(r => cats[r.category] = (cats[r.category]||0)+ +r.amount);
  const entries = Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  document.getElementById('charts-row').children[1].innerHTML = `
    <div class="chart-header"><div><div class="chart-title">Expense Breakdown</div><div class="chart-sub">By category</div></div></div>
    <div class="chart-body"><div class="chart-wrap"><canvas id="cat-chart"></canvas></div></div>`;
  if (!entries.length) { document.getElementById('charts-row').children[1].innerHTML += '<div class="empty-state" style="padding:30px"><div class="empty-sub">No expense data</div></div>'; return; }
  const palette = ['#5eead4','#5eb8f5','#a78bfa','#fbbf24','#f87171','#34d399','#f472b6','#818cf8'];
  chartCat = new Chart(document.getElementById('cat-chart').getContext('2d'), {
    type: 'doughnut',
    data: { labels:entries.map(e=>e[0]), datasets:[{ data:entries.map(e=>e[1]), backgroundColor:palette, borderWidth:0, hoverOffset:8 }] },
    options: {
      responsive:true, maintainAspectRatio:false, cutout:'68%',
      plugins: {
        legend: { position:'right', labels:{color:'#8891a8',font:{family:'DM Sans',size:12},boxWidth:10,padding:10} },
        tooltip: { backgroundColor:'#0f1217', borderColor:'rgba(255,255,255,0.08)', borderWidth:1, bodyColor:'#eaedf5', callbacks:{label:ctx=>` ${ctx.label}: ${fmtCurrency(ctx.raw)}`} }
      }
    }
  });
}

loadDashboard();
</script>
</body>
</html>
